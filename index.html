<!DOCTYPE html>
<html>
<head>
<title>FOODY - Online Food Delivery</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#fff8e6;
}

header{
    background:red;
    color:white;
    text-align:center;
    padding:15px;
    font-size:26px;
    font-weight:bold;
}

.container{
    padding:15px;
    text-align:center;
}

.card{
    display:inline-block;
    width:180px;
    margin:10px;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

.price{
    color:green;
    font-weight:bold;
}

button{
    background:green;
    color:white;
    border:none;
    padding:6px;
    margin-top:5px;
    cursor:pointer;
    border-radius:5px;
}

.cart{
    background:white;
    padding:15px;
    margin:10px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input{
    padding:5px;
    width:100px;
}

hr{
    margin:15px 0;
}
</style>

</head>

<body>

<header>🍔 FOODY - ONLINE FOOD DELIVERY</header>

<div class="container">

<h2>🔥 Menu</h2>

<div class="card">
🍔 Burger<br>
<span class="price">₹30</span><br>
<button onclick="add('Burger',30)">Add</button>
</div>

<div class="card">
🍕 Pizza<br>
<span class="price">₹40</span><br>
<button onclick="add('Pizza',40)">Add</button>
</div>

<div class="card">
🍜 Noodles<br>
<span class="price">₹35</span><br>
<button onclick="add('Noodles',35)">Add</button>
</div>

<div class="card">
🥪 Sandwich<br>
<span class="price">₹25</span><br>
<button onclick="add('Sandwich',25)">Add</button>
</div>

<div class="card">
🍟 Fries<br>
<span class="price">₹20</span><br>
<button onclick="add('Fries',20)">Add</button>
</div>

<div class="card">
🥤 Cold Drink<br>
<span class="price">₹15</span><br>
<button onclick="add('Cold Drink',15)">Add</button>
</div>

</div>

<div class="cart">

<h2>🛒 Cart</h2>

<div id="cart"></div>

<p>Distance (KM): 
<input type="number" id="km" value="1">
</p>

<h3 id="total">Total: ₹0</h3>

<button onclick="bill()">Generate Bill</button>
<button onclick="order()">Order on WhatsApp</button>

<hr>

<h2>💳 UPI Payment</h2>

<p><b>UPI ID:</b> 8449196052@nyes</p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=upi://pay?pa=8449196052@nyes&pn=FOODY&cu=INR"
style="width:180px;height:180px;border-radius:10px;border:1px solid #ccc;">

<p>📲 Scan QR to Pay</p>

</div>

<script>

let cart = [];

function add(name, price){
    cart.push({name, price});
    show();
}

function show(){
    let html = "";
    let total = 0;

    cart.forEach(item=>{
        html += item.name + " - ₹" + item.price + "<br>";
        total += item.price;
    });

    document.getElementById("cart").innerHTML = html;
    document.getElementById("total").innerText = "Total: ₹" + total;
}

function bill(){
    let km = document.getElementById("km").value;

    let food = cart.reduce((a,b)=>a+b.price,0);
    let delivery = km * 3;
    let total = food + delivery;

    document.getElementById("total").innerHTML =
    "Food: ₹" + food +
    "<br>Delivery: ₹" + delivery +
    "<br><b>Total: ₹" + total + "</b>";
}

function order(){

    let km = document.getElementById("km").value;

    let msg = "FOODY ORDER:%0A";

    cart.forEach(i=>{
        msg += i.name + " ₹" + i.price + "%0A";
    });

    let total = cart.reduce((a,b)=>a+b.price,0) + (km*3);

    msg += "%0ADistance: " + km + " KM";
    msg += "%0ATotal: ₹" + total;

    window.open("https://wa.me/91XXXXXXXXXX?text=" + msg);
}

</script>

</body>
</html>
