<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foody Delivery App</title>

<!-- 🎉 Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#ff5722;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    padding:20px;
}

.food{
    background:rgb(56, 59, 17);
    padding:15px;
    margin:30px 0;
    border-radius:30px;
    text-align:center;
}

.food img{
    width:200%;
    height:18px;
    object-fit:cover;
    border-radius:60px;
}

button{
    padding:15px 30px;
    margin-top:10px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    font-family:'Poppins', sans-serif;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}


.add{background:rgb(187, 28, 68);color:white;}
.clear{background:red;color:white;}
.order{background:#d3254b;color:white;}
.loc{background:#007bff;color:white;}

#cart{
    background:rgb(218, 84, 84);
    padding:15px;
    margin-top:20px;
    border-radius:10px;
}

.hidden{display:none;}
.order{
    background:#25D366;
    color:white;
    font-size:24px;
    padding:18px 40px;
    font-weight:bold;
}
input{
    width:100%;
    max-width:500px;
    height:50px;
    font-size:20px;
    padding:10px;
    border:2px solid #ccc;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1 style="font-size:80px;font-weight:800;">FOODY </h1>
<p>Fast & Smart Food Delivery</p>
</header>

<div class="container">
<h2 style="font-size:70px;font-weight:700;">Customer Details</h2>
<input id="name" placeholder="Name"><br><br>
<input id="mobile" placeholder="Mobile"><br><br>
<input id="address" placeholder="Address"><br><br>

<h3 style="font-size:30px;font-weight:100;">Payment Method</h3>
<select id="payment" onchange="togglePayment()" style="width:300px;height:50px;font-size:18px;">
    <option value="COD">Cash on Delivery</option>
    <option value="ONLINE">Online Payment</option>
</select>

<!-- 💳 QR -->
<div id="qrBox" class="hidden">
    <p><b>Pay via UPI:</b> 8449196052@nyes</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=upi://pay?pa=8449196052@nyes&pn=FOODY&cu=INR"
    style="width:180px;height:180px;border-radius:10px;border:1px solid #ccc;">

    <br>
    <button onclick="markPaid()" style="background:green;color:white;">
        I Have Paid
    </button>

    <div id="paymentStatus" style="margin-top:10px;font-weight:bold;">
        Payment Status: ❌ Not Paid
    </div>
</div>

<br>


<input id="location" placeholder="GPS Location" readonly><br><br>

<button class="loc" onclick="getLocation()">📍 Get Location</button>


<h2 style="font-size:50px;">🍔 Menu</h2>
<div class="food">
<h3>Pizza ₹99</h3>
<button class="add" onclick="add('Pizza',99)">Add</button>
</div>

<div class="food">
<h3>Burger ₹49</h3>
<button class="add" onclick="add('Burger',49)">Add</button>
</div>

<div class="food">
<h3>Sandwich ₹59</h3>
<button class="add" onclick="add('Sandwich',59)">Add</button>
</div>
<div class="food">
<h3>Samosa ₹15</h3>
<button class="add" onclick="add('Sandwich',15)">Add</button>
</div>

<div id="cart">
    <h2 style="font-size:50px;">🛒 Cart</h2>>


<ul id="list"></ul>

<p>Food Total: ₹<span id="total">0</span></p>
<p>Delivery: ₹<span id="delivery">0</span></p>
<p><b>Grand Total: ₹<span id="grand Total">0</span></b></p>

<p><b>Minimum Order ₹120 Required</b></p>

<button class="clear" onclick="clearCart()">Clear Cart</button>
<button class="order" onclick="order()">Order on WhatsApp</button>

</div>

</div>

<!-- 🔊 Sound -->
<audio id="successSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-3.mp3" type="audio/mpeg">
</audio>

<script>

let cart = [];
let total = 0;
let isPaid = false;

function add(name,price){
    cart.push({name,price});
    total += price;

    let li = document.createElement("li");
    li.innerText = name + " ₹" + price;
    document.getElementById("list").appendChild(li);

    updateCart();
}

function clearCart(){
    cart = [];
    total = 0;
    document.getElementById("list").innerHTML = "";
    updateCart();
}

function updateCart(){
    let dist = Number(document.getElementById("distance").value);
    let delivery = dist > 0 ? dist * 5 : 0;

    document.getElementById("total").innerText = total;
    document.getElementById("delivery").innerText = delivery;
    document.getElementById("grand").innerText = total + delivery;
}

function getLocation(){
    navigator.geolocation.getCurrentPosition(pos=>{
        document.getElementById("location").value =
        "https://maps.google.com/?q=" + pos.coords.latitude + "," + pos.coords.longitude;
    });
}

function togglePayment(){
    let method = document.getElementById("payment").value;

    document.getElementById("qrBox").style.display =
        method === "ONLINE" ? "block" : "none";

    isPaid = (method === "COD") ? true : false;

    updatePaymentUI();
}

function updatePaymentUI(){
    document.getElementById("paymentStatus").innerText =
        "Payment Status: " + (isPaid ? "✅ Success" : "❌ Not Paid");
}

function markPaid(){

    isPaid = true;
    updatePaymentUI();

    // 🔊 sound
    document.getElementById("successSound").play();

    // 🎉 confetti
    confetti({
        particleCount: 150,
        spread: 80,
        origin: { y: 0.6 }
    });

    // 💚 popup
    let popup = document.createElement("div");
    popup.innerText = "Payment Successful ✔ Order Ready!";
    popup.style.position = "fixed";
    popup.style.top = "20px";
    popup.style.left = "50%";
    popup.style.transform = "translateX(-50%)";
    popup.style.background = "green";
    popup.style.color = "white";
    popup.style.padding = "15px 25px";
    popup.style.borderRadius = "10px";
    popup.style.zIndex = "9999";

    document.body.appendChild(popup);

    setTimeout(()=> popup.remove(), 3000);
}
function order(){

    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let address = document.getElementById("address").value;
    let distance = Number(document.getElementById("distance").value);
    let location = document.getElementById("location").value;
    let payment = document.getElementById("payment").value;

    if(name=="" || mobile=="" || address==""){
        alert("Fill all details");
        return;
    }

    if(distance <= 0){
        alert("Distance required");
        return;
    }

    if(cart.length==0){
        alert("Cart empty");
        return;
    }

    if(total < 120){
        alert("Minimum order ₹120 required");
        return;
    }

    if(payment === "ONLINE" && !isPaid){
        alert("Please complete payment first!");
        return;
    }

    // ⭐ HERE IS YOUR MESSAGE (ADD THIS)
    alert("🙏 Thank you for your order! It is being prepared 🍔");

    let delivery = distance * 3;
    let grand = total + delivery;

    let msg =
`🍔 FOODY ORDER

Name: ${name}
Mobile: ${mobile}
Address: ${address}
Distance: ${distance} KM
Payment: ${payment}
Location: ${location}

Items:
cart.map(i=>i.name+" x "+i.qty+" = ₹"+(i.price*i.qty)).join("\n")

Total: ₹${total}
Delivery: ₹${delivery}
Grand: ₹${grand}`;

    window.open("https://wa.me/8449196052?text=" + encodeURIComponent(msg), "_blank");
}
let trackingStep = 0;

function startTracking(){
    document.getElementById("trackingPage").style.display = "block";

    let status = [
        "Order Placed ⏳",
        "Food is Being Prepared 🍳",
        "Out for Delivery 🚴",
        "Delivered 🏠"
    ];

    let bar = 0;

    let interval = setInterval(() => {

        if(trackingStep < status.length){
            document.getElementById("statusText").innerText = status[trackingStep];
            trackingStep++;

            bar += 33;
            document.getElementById("progressBar").style.width = bar + "%";
        } else {
            clearInterval(interval);
        }

    }, 2000);
}

function closeTracking(){
    document.getElementById("trackingPage").style.display = "none";
    trackingStep = 0;
}
</script>

</body>
</html>
